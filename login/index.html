<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Latenly</title>
    <meta name="description"
        content="Accede a tu cuenta de Latenly para ver tus reportes de oportunidades y conectar tu WhatsApp.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔮</text></svg>">
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            animation: fadeInUp 0.6s ease forwards;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo a {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 2rem;
            color: var(--text-primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.1rem;
        }

        .login-logo a span {
            color: var(--brand-violet);
        }

        .login-logo a:hover {
            text-decoration: none;
        }

        .login-logo p {
            color: var(--text-tertiary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .login-submit {
            margin-top: 0.5rem;
            width: 100%;
            position: relative;
        }

        .login-submit .spinner {
            display: none;
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border-width: 2px;
        }

        .login-submit.loading .spinner {
            display: block;
        }

        .login-submit.loading .btn-glow {
            opacity: 0.7;
            pointer-events: none;
        }

        .login-error {
            background: var(--color-danger-dim);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--color-danger);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-lg);
            font-size: 0.875rem;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        .login-error.visible {
            display: block;
        }

        .login-success {
            background: var(--color-success-dim);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--color-success);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-lg);
            font-size: 0.875rem;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        .login-success.visible {
            display: block;
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 0.5rem 0;
            color: var(--text-tertiary);
            font-size: 0.8rem;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-subtle);
        }

        .login-toggle {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .login-toggle a {
            color: var(--brand-violet);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .login-toggle a:hover {
            color: var(--brand-pink);
        }

        .forgot-link {
            text-align: right;
            margin-top: -0.5rem;
        }

        .forgot-link a {
            font-size: 0.8rem;
            color: var(--text-tertiary);
        }

        .forgot-link a:hover {
            color: var(--brand-violet);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.25rem;
            transition: color var(--transition-fast);
        }

        .password-toggle:hover {
            color: var(--text-primary);
        }
    </style>
</head>

<body>

    <!-- Background -->
    <div class="bg-ambient"></div>
    <div class="grain-overlay"></div>

    <div class="login-page">
        <div class="login-card glass-panel-static">

            <div class="login-logo">
                <a href="/">Latenly<span>.</span></a>
                <p id="loginSubtitle">Accede a tu cuenta</p>
            </div>

            <div class="login-error" id="loginError"></div>
            <div class="login-success" id="loginSuccess"></div>

            <form class="login-form" id="loginForm" autocomplete="on">
                <div class="form-group">
                    <label class="input-label" for="emailInput">Email</label>
                    <input type="email" id="emailInput" class="input-field" placeholder="doctor@clinica.com"
                        autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label class="input-label" for="passwordInput">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="passwordInput" class="input-field" placeholder="Mínimo 6 caracteres"
                            autocomplete="current-password" minlength="6" required>
                        <button type="button" class="password-toggle" id="passwordToggle"
                            aria-label="Mostrar contraseña">👁</button>
                    </div>
                </div>

                <div class="forgot-link" id="forgotLinkWrapper">
                    <a href="#" id="forgotLink">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="login-submit" id="submitWrapper">
                    <button type="submit" class="btn-glow large" style="width: 100%;" id="submitBtn">
                        Iniciar Sesión
                    </button>
                    <div class="spinner"></div>
                </div>
            </form>


        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="app.js"></script>

</body>

</html>
